# This project was generated with 0.3.13 using template: https://github.com/beeware/briefcase-template@v0.3.13
# Dependency/platform sections below have been updated to align with template v0.4.4 defaults.
[tool.briefcase]
project_name = "PFShare"
bundle = "ir.amjoshaghani.pfshare"
version = "0.1.0"
url = "https://amjoshaghani.github.io/pfshare-app"
license = "Apache-2.0"
license-files = ["LICENSE"]
author = "Amir M. Joshaghani"
author_email = "amjoshaghani@gmail.com"

[tool.briefcase.app.pfshare]
formal_name = "PFShare"
description = "Graphical User Interface for the PFShare project."
long_description = """"""
icon = "src/pfshare/resources/pfshare"
sources = [
    "src/pfshare",
]
test_sources = [
    "tests",
]

requires = [
    "flask",
]
test_requires = [
    "pytest",
]

[tool.briefcase.app.pfshare.macOS]
requires = [
    "toga-cocoa~=0.5.0",
    "std-nslog~=2.0.0"
]

[tool.briefcase.app.pfshare.linux]
requires = [
    "toga-gtk~=0.5.0",
]

[tool.briefcase.app.pfshare.linux.system.debian]
system_requires = [
    # Needed to compile pycairo wheel
    'libcairo2-dev',
    # Needed to compile PyGObject wheel
    'libgirepository-2.0-dev',
]

system_runtime_requires = [
    # Needed to provide GTK
    "libgtk-3-0",
    # Needed to provide GI bindings to GTK
    "libgirepository-2.0-0",
    "gir1.2-gtk-3.0",
    # Dependencies that GTK looks for at runtime
    "libcanberra-gtk3-module",
    # Needed to provide WebKit2 at runtime
    # "libwebkit2gtk-4.0-37",
    # "gir1.2-webkit2-4.0",
]

[tool.briefcase.app.pfshare.linux.system.rhel]
system_requires = [
    # Needed to compile pycairo wheel
    'cairo-gobject-devel',
    # Needed to compile PyGObject wheel
    'gobject-introspection-devel',
]

system_runtime_requires = [
    # Needed to support Python bindings to GTK
    "gobject-introspection",
    # Needed to provide GTK
    "gtk3",
    # Dependencies that GTK looks for at runtime
    "libcanberra-gtk3",
    # Needed to provide WebKit2 at runtime
    # "webkit2gtk3",
]

[tool.briefcase.app.pfshare.linux.system.suse]
system_requires = [
    # Needed to compile pycairo wheel
    "cairo-devel",
    # Needed to compile PyGObject wheel
    "gobject-introspection-devel",
]

system_runtime_requires = [
    # Needed to provide GTK
    "gtk3",
    # Needed to support Python bindings to GTK
    "gobject-introspection", "typelib(Gtk) = 3.0",
    # Dependencies that GTK looks for at runtime
    "libcanberra-gtk3-module",
    # Needed to provide WebKit2 at runtime
    # "libwebkit2gtk3", "typelib(WebKit2)",
]

[tool.briefcase.app.pfshare.linux.system.arch]
system_requires = [
    # Needed to compile pycairo wheel
    'cairo',
    # Needed to compile PyGObject wheel
    'gobject-introspection',
    # Runtime dependencies that need to exist so that the
    # Arch package passes final validation.
    # Needed to provide GTK
    "gtk3",
    # Dependencies that GTK looks for at runtime
    "libcanberra",
    # Needed to provide WebKit2
    # "webkit2gtk",
]

system_runtime_requires = [
    # Needed to provide GTK
    "gtk3",
    # Needed to provide PyGObject bindings
    "gobject-introspection-runtime",
    # Dependencies that GTK looks for at runtime
    "libcanberra",
    # Needed to provide WebKit2 at runtime
    # "webkit2gtk",
]

[tool.briefcase.app.pfshare.linux.appimage]
manylinux = "manylinux_2_28"

system_requires = [
    # Needed to compile pycairo wheel
    "cairo-gobject-devel",
    # Needed to compile PyGObject wheel
    "gobject-introspection-devel",
    # Needed to provide GTK
    "gtk3-devel",
    # Dependencies that GTK looks for at runtime, that need to be
    # in the build environment to be picked up by linuxdeploy
    "libcanberra-gtk3",
    "PackageKit-gtk3-module",
    "gvfs-client",
]

linuxdeploy_plugins = [
    "DEPLOY_GTK_VERSION=3 gtk",
]

[tool.briefcase.app.pfshare.linux.flatpak]
flatpak_runtime = "org.gnome.Platform"
flatpak_runtime_version = "48"
flatpak_sdk = "org.gnome.Sdk"

[tool.briefcase.app.pfshare.windows]
requires = [
    "toga-winforms~=0.5.0",
]

# Mobile deployments
[tool.briefcase.app.pfshare.iOS]
requires = [
    "toga-iOS~=0.5.0",
    "std-nslog~=2.0.0"
]

[tool.briefcase.app.pfshare.android]
requires = [
    "toga-android~=0.5.0"
]

base_theme = "Theme.MaterialComponents.Light.DarkActionBar"

build_gradle_dependencies = [
    "com.google.android.material:material:1.13.0",
]

build_gradle_extra_content = """
android {
    defaultConfig {
        python {
            staticProxy "pfshare.service"
        }
    }
}
"""

android_manifest_extra_content = """
<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
<uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />
<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
"""

android_manifest_application_extra_content = """
<service
    android:name="pfshare.PFShareService"
    android:enabled="true"
    android:exported="false"
    android:foregroundServiceType="dataSync" />
"""

# Web deployments
[tool.briefcase.app.pfshare.web]
requires = [
    "toga-web~=0.5.0",
]
style_framework = "Bootstrap v4.6"
